[pytest]
log_cli = 1
log_cli_level = INFO
env =
    SERVICE_NAME_COMPONENT=QE-SparqlExecuter-Component
    SERVICE_DESCRIPTION_COMPONENT=Executes the generated SPARQL query against a knowledge graph
    SPARQL_ENDPOINT=http://dbpedia.example/sparql
    AGENT_HEADER=qanary-test-agent
    SERVER_HOST=http://localhost
    SERVER_PORT=8080
    SPRING_BOOT_ADMIN_URL=http://localhost:8080
    SPRING_BOOT_ADMIN_USERNAME=admin
    SPRING_BOOT_ADMIN_PASSWORD=admin
