name: Qanary component test pipeline

on:
  pull_request:
    branches: [master]

jobs:
  test-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the coverage report as a PR comment
    env:
      BABELFY_API_KEY: someapikey
      CHATGPT_API_KEY: someapikey
      DANDELION_API_KEY: someapikey
      MEANINGCLOUD_API_KEY: someapikey
      TAGME_API_KEY: someapikey
      TEXTRAZOR_API_KEY: someapikey
      OPENAI_API_KEY: someapikey
      BABELFY_API_LIVE_TEST_ACTIVE: false
      PLATYPUS_API_LIVE_TEST_ACTIVE: false
      TEXTRAZOR_API_LIVE_TEST_ACTIVE: false
      CHATGPT_API_LIVE_TEST_ACTIVE: false
      DANDELION_API_LIVE_TEST_ACTIVE: false
      MEANINGCLOUD_API_LIVE_TEST_ACTIVE: false
      AGDISTIS_API_LIVE_TEST_ACTIVE: false
      OPENAI_API_LIVE_TEST_ACTIVE: false
      TAGME_API_LIVE_TEST_ACTIVE: false
    steps:
      - name: Configure java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "25"
      - uses: actions/checkout@v7
      - name: Test Java components
        run: bash -c ./service_config/test_java_components.sh
      - name: Aggregate Java coverage report
        if: always() # report coverage even when some component tests fail
        run: python3 service_config/jacoco_summary.py
      - name: Post Java coverage comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: java-component-coverage
          path: java-coverage-summary.md
      - name: Upload Java coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage-html
          path: "**/target/site/jacoco/"
          if-no-files-found: warn
  test-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the coverage report as a PR comment
    steps:
      - name: Configure Python
        uses: actions/setup-python@v6
        id: setup_python
        with:
          python-version: "3.12"
      - name: "Remove swap"
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          df -h
      - name: "Remove boost & tools"
        run: |
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h
      - name: "Remove dotnet"
        run: |
          sudo rm -rf /usr/share/dotnet/shared/
          sudo rm -rf /usr/share/dotnet/host/
          sudo rm -rf /usr/share/dotnet/sdk/
          df -h
      - name: "Remove android"
        run: |
          sudo rm -rf "$ANDROID_SDK_ROOT"
          sudo rm -rf /usr/local/lib/android
          df -h
      - name: "Remove swift"
        run: |
          sudo rm -rf "$SWIFT_PATH"
          sudo rm -rf /usr/share/swift
          df -h
      - name: "apt-get clean"
        run: |
          sudo apt-get clean
          df -h          
      - uses: actions/checkout@v7
      - name: Cache virtual environments
        uses: actions/cache@v6
        with:
          key: environments-${{ runner.os }}-${{ steps.setup_python.outputs.python-version}}-${{ hashFiles('**/requirements.txt') }}
          path: environments
      - name: Test Python components
        run: bash -c ./service_config/test_python_components.sh
      - name: Aggregate Python coverage report
        if: always() # report coverage even when some component tests fail
        run: python service_config/coverage_summary.py
      - name: Post Python coverage comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: python-component-coverage
          path: python-coverage-summary.md
      - name: Upload Python coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-html
          path: "**/htmlcov/"
          if-no-files-found: warn
